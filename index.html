<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minamo Poker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        .border-frame {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px solid #fff;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Corner angles */
        .border-frame::before,
        .border-frame::after,
        .corner-bl::before,
        .corner-br::before {
            content: '';
            position: absolute;
            width: 44px;
            height: 44px;
            border-color: #fff;
            border-style: solid;
        }

        .border-frame::before {
            top: 8px;
            left: 8px;
            border-width: 1px 0 0 1px;
        }

        .border-frame::after {
            top: 8px;
            right: 8px;
            border-width: 1px 1px 0 0;
        }

        .corner-bl::before {
            bottom: 8px;
            left: 8px;
            border-width: 0 0 1px 1px;
        }

        .corner-br::before {
            bottom: 8px;
            right: 8px;
            border-width: 0 1px 1px 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 600px;
            width: 100%;
            flex: 1;
            justify-content: center;
        }

        .logo {
            width: max(30vw, 50vh);
            max-width: 500px;
            min-width: 200px;
            margin-bottom: 40px;
        }

        .logo img {
            width: 100%;
            height: auto;
        }

        .buttons {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .store-badge {
            height: 54px;
            width: auto;
            transition: opacity 0.2s;
        }

        .store-badge:hover {
            opacity: 0.8;
        }

        .android-group {
            opacity: 0.35;
        }

        .android-group .store-badge {
            cursor: default;
            filter: grayscale(100%);
        }

        .android-group .store-badge:hover {
            opacity: 1;
        }

        .under-dev {
            font-size: 12px;
            color: #888;
            letter-spacing: 0.5px;
        }

        .footer {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 4px;
        }

        .footer a {
            color: #aaa;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #fff;
        }

        .footer .dot {
            color: #aaa;
            font-size: 6px;
        }

        @media (max-height: 500px) {
            .logo {
                max-width: 250px;
                margin-bottom: 20px;
            }
            .buttons {
                margin-bottom: 20px;
            }
            .store-badge {
                height: 40px;
            }
        }

        @media (max-width: 400px) {
            .logo {
                max-width: 280px;
                margin-bottom: 24px;
            }
            .buttons {
                gap: 16px;
                margin-bottom: 24px;
            }
            .store-badge {
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="border-frame">
        <div class="corner-bl"></div>
        <div class="corner-br"></div>

        <div class="container">
            <div class="logo">
                <img src="logo.svg" alt="Minamo Poker">
            </div>

            <div class="buttons">
                <div class="button-group">
                    <a href="https://apps.apple.com/app/id1518356362" target="_blank" rel="noopener">
                        <img class="store-badge" alt="Download on the App Store" src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg">
                    </a>
                </div>

                <div class="button-group android-group">
                    <img class="store-badge" alt="Get it on Google Play" src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
                    <span class="under-dev">Coming Soon</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="mailto:support@minamo.co">Contact Us</a>
            <span class="dot">&#9679;</span>
            <a href="/privacy.html">Privacy Policy</a>
        </div>
    </div>
</body>
</html>
